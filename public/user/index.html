<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻院教室借用系统 - 用户端</title>
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .booking-form-modal .form-row { display: flex; gap: 16px; }
    .booking-form-modal .form-row .form-group { flex: 1; }
    @media (max-width: 768px) { .booking-form-modal .form-row { flex-direction: column; gap: 0; } }
    .time-range-info { background: #F0F5FF; padding: 12px; border-radius: 6px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .time-range-info .time-display { font-size: 16px; font-weight: 600; color: var(--primary); }
    .booking-detail { padding: 16px; background: var(--bg-light); border-radius: var(--radius); margin-bottom: 12px; }
    .booking-detail .row { display: flex; margin-bottom: 8px; }
    .booking-detail .label { width: 100px; color: var(--text-secondary); font-size: 13px; }
    .booking-detail .value { color: var(--text-primary); font-size: 13px; }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <h2>新闻院教室借用系统</h2>
      <p class="subtitle">用户端登录</p>
      <div class="login-tabs">
        <div class="login-tab active" data-tab="login">登录</div>
        <div class="login-tab" data-tab="register">注册</div>
      </div>
      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码">
        </div>
        <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()">登录</button>
        <p style="text-align:center;margin-top:12px;font-size:13px;color:var(--text-muted)">
          测试账号：user1 / user123
        </p>
        <p style="text-align:center;margin-top:8px;font-size:13px;">
          <a href="/admin" style="color:var(--primary)">管理员端入口 →</a>
        </p>
      </div>
      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label class="form-label">用户名 <span class="required">*</span></label>
          <input type="text" class="form-input" id="regUsername" placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label class="form-label">密码 <span class="required">*</span></label>
          <input type="password" class="form-input" id="regPassword" placeholder="请输入密码">
        </div>
        <div class="form-group">
          <label class="form-label">姓名 <span class="required">*</span></label>
          <input type="text" class="form-input" id="regName" placeholder="请输入姓名">
        </div>
        <div class="form-group">
          <label class="form-label">所属部门/班级</label>
          <input type="text" class="form-input" id="regDepartment" placeholder="请输入部门或班级">
        </div>
        <div class="form-group">
          <label class="form-label">联系电话</label>
          <input type="text" class="form-input" id="regPhone" placeholder="请输入联系电话">
        </div>
        <button class="btn btn-primary btn-block btn-lg" onclick="doRegister()">注册</button>
      </div>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="mainApp" style="display:none">
    <!-- 导航栏 -->
    <nav class="navbar">
      <div class="navbar-brand">
        <img src="/img/favicon.png" alt="新闻院" style="width:24px;height:24px;border-radius:50%">
        新闻院教室借用系统
      </div>
      <div class="navbar-menu">
        <div class="navbar-badge" id="notifBadge" onclick="toggleNotifications()" style="display:none">0</div>
        <div class="navbar-user">
          <span id="userDisplayName"></span>
          <button class="btn btn-sm btn-outline" onclick="logout()">退出</button>
        </div>
      </div>
    </nav>

    <!-- 通知面板 -->
    <div class="notification-panel" id="notifPanel">
      <div style="padding:16px;border-bottom:1px solid var(--border-light)">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-weight:600">通知</span>
          <span class="modal-close" onclick="toggleNotifications()">✕</span>
        </div>
      </div>
      <div id="notifList"></div>
    </div>

    <!-- 内容区 -->
    <div class="container">
      <div class="tabs">
        <div class="tab-item active" data-tab="classrooms" onclick="switchTab('classrooms')">浏览教室</div>
        <div class="tab-item" data-tab="bookings" onclick="switchTab('bookings')">我的申请</div>
      </div>

      <!-- 浏览教室 -->
      <div id="classroomsTab">
        <div class="filter-bar">
          <select class="form-select" id="filterBuilding" onchange="loadClassrooms()">
            <option value="">全部楼栋</option>
          </select>
          <select class="form-select" id="filterCapacity" onchange="loadClassrooms()">
            <option value="">不限容量</option>
            <option value="20">≥20人</option>
            <option value="40">≥40人</option>
            <option value="60">≥60人</option>
            <option value="100">≥100人</option>
          </select>
          <select class="form-select" id="filterEquipment" onchange="loadClassrooms()">
            <option value="">不限设备</option>
          </select>
        </div>
        <div class="classroom-grid" id="classroomGrid"></div>
      </div>

      <!-- 我的申请 -->
      <div id="bookingsTab" style="display:none">
        <div class="filter-bar">
          <select class="form-select" id="filterStatus" onchange="loadMyBookings()">
            <option value="">全部状态</option>
            <option value="pending">待审批</option>
            <option value="approved">已通过</option>
            <option value="rejected">已拒绝</option>
            <option value="cancelled">已取消</option>
          </select>
          <input type="date" class="form-input" id="filterStartDate" onchange="loadMyBookings()" style="max-width:160px">
          <input type="date" class="form-input" id="filterEndDate" onchange="loadMyBookings()" style="max-width:160px">
        </div>
        <div id="myBookingsList"></div>
      </div>
    </div>
  </div>

  <!-- 日历选择模态框 -->
  <div class="modal-overlay" id="calendarModal">
    <div class="modal" style="max-width:700px">
      <div class="modal-title">
        <span id="calendarTitle">选择借用时段</span>
        <span class="modal-close" onclick="closeCalendarModal()">✕</span>
      </div>
      <div id="calendarClassroomInfo" style="margin-bottom:12px;font-size:14px;color:var(--text-secondary)"></div>
      <!-- 月份导航 -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <button class="btn btn-sm btn-outline" onclick="calendarPrevMonth()">◀ 上月</button>
        <span id="calendarMonthLabel" style="font-weight:600;font-size:16px"></span>
        <button class="btn btn-sm btn-outline" onclick="calendarNextMonth()">下月 ▶</button>
      </div>
      <!-- 日历 -->
      <div class="calendar-grid" id="calendarGrid"></div>
      <!-- 时段选择 -->
      <div id="timeSlotSection" style="display:none;margin-top:16px">
        <div class="card-header">
          <span style="font-size:14px;font-weight:600">选择时段（点击选择开始时间，再点击选择结束时间）</span>
        </div>
        <div class="time-slot-grid" id="timeSlotGrid"></div>
        <div class="time-range-info" id="timeRangeInfo" style="display:none;margin-top:12px">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="var(--primary)"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm0 14a6 6 0 110-12 6 6 0 010 12zM8 3a1 1 0 011 1v3h3a1 1 0 010 2H9v3a1 1 0 01-2 0V9H4a1 1 0 010-2h3V4a1 1 0 011-1z"/></svg>
          <span>已选时段：</span>
          <span class="time-display" id="timeRangeDisplay"></span>
        </div>
        <button class="btn btn-primary btn-block" id="goToFormBtn" style="display:none;margin-top:12px" onclick="showBookingForm()">填写申请信息</button>
      </div>
    </div>
  </div>

  <!-- 借用申请表模态框 -->
  <div class="modal-overlay" id="bookingFormModal">
    <div class="modal booking-form-modal">
      <div class="modal-title">
        <span>借用申请</span>
        <span class="modal-close" onclick="closeBookingFormModal()">✕</span>
      </div>
      <div class="time-range-info" id="bookingTimeInfo"></div>
      <form id="bookingForm" onsubmit="submitBooking(event)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">借用人姓名 <span class="required">*</span></label>
            <input type="text" class="form-input" id="bfBorrowerName" required>
          </div>
          <div class="form-group">
            <label class="form-label">所属部门/班级 <span class="required">*</span></label>
            <input type="text" class="form-input" id="bfDepartment" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">联系电话 <span class="required">*</span></label>
            <input type="text" class="form-input" id="bfPhone" required>
          </div>
          <div class="form-group">
            <label class="form-label">预计人数 <span class="required">*</span></label>
            <input type="number" class="form-input" id="bfCount" required min="1">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">借用用途 <span class="required">*</span></label>
          <textarea class="form-textarea" id="bfPurpose" required placeholder="请描述借用用途"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">备注</label>
          <textarea class="form-textarea" id="bfNotes" placeholder="其他备注信息（可选）"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">提交申请</button>
      </form>
    </div>
  </div>

  <!-- 申请详情模态框 -->
  <div class="modal-overlay" id="bookingDetailModal">
    <div class="modal">
      <div class="modal-title">
        <span>申请详情</span>
        <span class="modal-close" onclick="closeBookingDetailModal()">✕</span>
      </div>
      <div id="bookingDetailContent"></div>
      <div id="bookingDetailActions" style="margin-top:16px"></div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/common.js"></script>
  <script src="/js/user.js"></script>
</body>
</html>
