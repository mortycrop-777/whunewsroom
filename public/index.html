<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教室借用管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .landing-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4A90D9 0%, #764ba2 100%);
    }
    .landing-card {
      text-align: center;
      max-width: 480px;
      width: 90vw;
    }
    .landing-card h1 {
      color: white;
      font-size: 32px;
      margin-bottom: 8px;
    }
    .landing-card p {
      color: rgba(255,255,255,0.8);
      font-size: 16px;
      margin-bottom: 32px;
    }
    .landing-links {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .landing-link {
      background: white;
      padding: 24px 32px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-primary);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      flex: 1;
      max-width: 200px;
    }
    .landing-link:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .landing-link .icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .landing-link .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .landing-link .desc {
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="landing-page">
    <div class="landing-card">
      <h1>教室借用管理系统</h1>
      <p>高效管理教室资源，便捷预约借用</p>
      <div class="landing-links">
        <a href="/user" class="landing-link">
          <div class="icon">🎓</div>
          <div class="title">用户端</div>
          <div class="desc">浏览教室、提交申请</div>
        </a>
        <a href="/admin" class="landing-link">
          <div class="icon">⚙️</div>
          <div class="title">管理员端</div>
          <div class="desc">审批管理、排班视图</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
